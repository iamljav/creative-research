    <style>
        /* ── RESET ───────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        /* ── TOP NAV ─────────────────────────────────────────── */
        #topnav {
            width: 92%;
            max-width: 1200px;
            margin: 40px auto 50px auto;
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-avatar-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            gap: 6px;
        }

        .nav-avatar-wrap img.avatar-img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .nav-avatar-wrap span {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #000;
        }

        .nav-links {
            display: flex;
            align-items: flex-start;
            gap: 24px;
        }

        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            gap: 6px;
        }

        .nav-link img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            display: block;
        }

        .nav-link span {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #000;
        }

        /* ── POSTS AREA ──────────────────────────────────────── */
        #posts-wrap {
            width: 92%;
            max-width: 1200px;
            margin: 0 auto;
        }

        article {
            margin-bottom: 80px;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 10px;
            line-height: 1.6;
        }

        article a {
            color: #000000;
            text-decoration: underline;
        }

        /* ── VIDEO EMBED — responsive 16:9 ──────────────────── */
        .video-wrap {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            margin: 0 0 6px 0;
            overflow: hidden;
        }

        .video-wrap iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── POST CAPTION ────────────────────────────────────── */
        .post-caption {
            font-size: 10px;
            font-family: Helvetica, Arial, sans-serif;
            color: #000;
            margin-top: 6px;
            line-height: 1.5;
        }

        .post-caption em { font-style: italic; }

        /* ── TITLE TRIGGER ───────────────────────────────────── */
        .post-title-trigger {
            cursor: pointer;
            text-decoration: none;
            border-bottom: 1px solid #000;
        }

        .post-title-trigger:hover {
            opacity: 0.5;
        }

        /* ── INFO MODAL ──────────────────────────────────────── */
        .info-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 9998;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .info-overlay.active { display: flex; }

        .info-box {
            background: #fff;
            color: #000;
            max-width: 480px;
            width: 100%;
            padding: 28px 32px;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 11px;
            line-height: 1.7;
            position: relative;
        }

        .info-box-title {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 0 0 14px 0;
        }

        .info-box-body {
            margin: 0;
        }

        .info-box-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 300;
            cursor: pointer;
            color: #000;
            line-height: 1;
            opacity: 0.4;
            padding: 4px;
        }

        .info-box-close:hover { opacity: 1; }

        .info-box-link {
            display: none;
            margin-top: 14px;
            font-size: 10px;
            font-family: Helvetica, Arial, sans-serif;
            color: #000;
            text-decoration: underline;
            word-break: break-all;
        }

        .info-box-link.visible { display: block; }

        /* ── CAROUSEL ────────────────────────────────────────── */
        .carousel-wrap {
            position: relative;
            width: 100%;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.4s ease;
            will-change: transform;
        }

        .carousel-slide {
            min-width: 100%;
            width: 100%;
            flex-shrink: 0;
        }

        .carousel-slide img {
            width: 100%;
            height: auto;
            display: block;
            cursor: zoom-in;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            z-index: 10;
            opacity: 0.25;
            transition: opacity 0.2s ease;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 300;
            color: #000;
            line-height: 1;
        }

        .carousel-btn:hover { opacity: 0.6; }
        .carousel-btn.prev  { left: 4px; }
        .carousel-btn.next  { right: 4px; }

        .carousel-counter {
            text-align: right;
            font-size: 8px;
            font-family: Helvetica, Arial, sans-serif;
            color: #999;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ── LIGHTBOX ────────────────────────────────────────── */
        .lightbox-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 9999;
            cursor: zoom-out;
            align-items: center;
            justify-content: center;
        }

        .lightbox-overlay.active { display: flex; }

        .lightbox-overlay img {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
            display: block;
        }

        #posts-wrap article img { cursor: zoom-in; }

        /* ── MOBILE ──────────────────────────────────────────── */
        @media screen and (max-width: 768px) {
            #topnav {
                width: 90%;
                margin: 24px auto 36px auto;
                gap: 20px;
                flex-wrap: wrap;
            }

            .nav-link img { width: 32px; height: 32px; }

            #posts-wrap {
                width: 90%;
            }

            article { font-size: 12px; }

            .info-box {
                padding: 20px 20px;
            }
        }
    </style>
</head>
<body>

<!-- TOP NAV -->
<nav id="topnav">

<!-- POSTS -->
<div id="posts-wrap">
    <main id="posts">

            <div class="video-wrap" style="padding-bottom:0; height:auto;">

            <div class="video-wrap">
                <iframe
                    src="https://player.vimeo.com/video/1197362495?h=d30c981759&title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479"

                    title="selfie | mitochondrial dna electrophoresis, generative audio VST, digital manipulation">

                <strong>untitled [You, Whom I Have Always Hated]</strong> | <em>mitochondrial dna electrophoresis, generative audio VST, digital manipulation</em>
            </p>

<!-- INFO MODAL -->
<div class="info-overlay" id="info-overlay">
    <div class="info-box" id="info-box">
        <button class="info-box-close" id="info-box-close" aria-label="Close">&#x2715;</button>
        <p class="info-box-title" id="info-box-title"></p>
        <p class="info-box-body" id="info-box-body"></p>
        <a class="info-box-link" id="info-box-link" href="#" target="_blank" rel="noopener noreferrer"></a>
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox-overlay" id="lightbox">
    <img id="lightbox-img" src="" alt="">
</div>

<script>
    // ── INFO MODAL ────────────────────────────────────────────
    var infoOverlay = document.getElementById('info-overlay');
    var infoBox     = document.getElementById('info-box');
    var infoTitle   = document.getElementById('info-box-title');
    var infoBody    = document.getElementById('info-box-body');
    var infoClose   = document.getElementById('info-box-close');
    var infoLink    = document.getElementById('info-box-link');

    document.addEventListener('click', function(e) {
        var trigger = e.target.closest('.post-title-trigger');
        if (trigger) {
            e.preventDefault();
            infoTitle.textContent = trigger.dataset.title || '';
            infoBody.innerHTML = '';
            (trigger.dataset.description || '').split('||').forEach(function(para) {
                var p = document.createElement('p');
                p.style.margin = '0 0 10px 0';
                p.textContent = para.trim();
                infoBody.appendChild(p);
            });
            var link = trigger.dataset.link || '';
            if (link) {
                infoLink.href        = link;
                infoLink.textContent = link;
                infoLink.classList.add('visible');
            } else {
                infoLink.classList.remove('visible');
            }
            infoOverlay.classList.add('active');
        }
    });

    infoOverlay.addEventListener('click', function(e) {
        if (!infoBox.contains(e.target)) {
            infoOverlay.classList.remove('active');
        }
    });

    infoClose.addEventListener('click', function() {
        infoOverlay.classList.remove('active');
    });

    // ── LIGHTBOX ──────────────────────────────────────────────
    var overlay = document.getElementById('lightbox');
    var lbImg   = document.getElementById('lightbox-img');

    document.addEventListener('click', function(e) {
        var img = e.target.closest('#posts img');
        if (img && !e.target.closest('.carousel-btn') && !img.dataset.noLightbox) {
            lbImg.src = img.src;
            lbImg.alt = img.alt || '';
            overlay.classList.add('active');
        }
    });

    overlay.addEventListener('click', function() {
        overlay.classList.remove('active');
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            overlay.classList.remove('active');
            infoOverlay.classList.remove('active');
        }
    });

    // ── OPEN POST LINKS IN NEW TAB ────────────────────────────
    document.querySelectorAll('#posts article a').forEach(function(a) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
    });

    // ── CAROUSEL ──────────────────────────────────────────────
    document.querySelectorAll('.carousel-wrap').forEach(function(carousel) {
        var track  = carousel.querySelector('.carousel-track');
        var slides = carousel.querySelectorAll('.carousel-slide');
        var total  = slides.length;
        if (total <= 1) return;

        var current = 0;

        var prevBtn = document.createElement('button');
        prevBtn.className   = 'carousel-btn prev';
        prevBtn.textContent = '<';
        prevBtn.setAttribute('aria-label', 'Previous');

        var nextBtn = document.createElement('button');
        nextBtn.className   = 'carousel-btn next';
        nextBtn.textContent = '>';
        nextBtn.setAttribute('aria-label', 'Next');

        carousel.appendChild(prevBtn);
        carousel.appendChild(nextBtn);

        var counter = document.createElement('div');
        counter.className   = 'carousel-counter';
        counter.textContent = '1 / ' + total;
        carousel.parentNode.insertBefore(counter, carousel.nextSibling);

        function goTo(index) {
            current = (index + total) % total;
            track.style.transform = 'translateX(-' + (current * 100) + '%)';
            counter.textContent   = (current + 1) + ' / ' + total;
        }

        prevBtn.addEventListener('click', function() { goTo(current - 1); });
        nextBtn.addEventListener('click', function() { goTo(current + 1); });
    });
</script>

</body>
